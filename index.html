<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA TERPAC v540.0</title>
    <style>
        :root { --verde: #ABED87; --verde-oscuro: #5a8a3d; --gris-bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--gris-bg); padding: 15px; text-align: center; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; border-top: 8px solid var(--verde); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--verde); border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; color: #333; font-size: 16px; }
        #piloto-box { font-weight: bold; color: var(--verde-oscuro); margin: 10px 0; display: none; padding: 15px; background: #f0fdf0; border-radius: 10px; border: 1px dashed var(--verde); text-align: left; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h2 style="color:var(--verde-oscuro); margin-top:0;">TERPAC LOGIN</h2>
        <input type="text" id="u" placeholder="Usuario">
        <input type="password" id="p" placeholder="Contraseña">
        <button class="btn" onclick="entrar()" style="width:100%">INGRESAR</button>
    </div>

    <div id="ui-app" class="card" style="display:none;">
        <h3 style="margin-top:0; color:var(--verde-oscuro);">Captura Terpac</h3>
        <input type="text" id="id-in" placeholder="ID PILOTO (101, 102)" oninput="check()">
        <div id="piloto-box"></div>
        <select id="mov"><option>1) Arribo</option><option>2) Entrada</option><option>3) Salida</option></select>
        <select id="prod"><option>SBM</option><option>YC (USA)</option><option>SWW</option></select>
        <button id="btn-env" class="btn" onclick="enviar()" style="width:100%">REGISTRAR EN AIRTABLE 🚀</button>
    </div>

    <script>
        const pilotos = { "101": { n: "Juan Perez" }, "102": { n: "Pedro Marmol" } };

        function entrar() {
            if(document.getElementById('u').value.toLowerCase().trim()=="op1" && document.getElementById('p').value=="terpac1") {
                document.getElementById('login').style.display='none'; 
                document.getElementById('ui-app').style.display='block';
            } else { alert("Acceso Incorrecto"); }
        }

        function check() {
            const id = document.getElementById('id-in').value.trim();
            const box = document.getElementById('piloto-box');
            if(pilotos[id]) { 
                box.innerText = "👨‍✈️ Piloto: " + pilotos[id].n; 
                box.style.display='block'; 
            } else { 
                box.style.display='none'; 
            }
        }

        async function enviar() {
            const id = document.getElementById('id-in').value.trim();
            if(!pilotos[id]) return alert("ID no encontrado");

            const btn = document.getElementById('btn-env');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            const APP_ID = 'app3cdqCOInpldMCJ';
            const TABLE_ID = 'tblElQcwWk5BvQiX8';
            const TOKEN = 'pat4AVN7AOIYp9iCj.c6b58fa271e8e07e6291d08b2c6a1e0d54a49166ff80ef7a0fb73f1b4aefd55c';

            const infoTexto = `ID: ${id} | Piloto: ${pilotos[id].n} | Mov: ${document.getElementById('mov').value} | Prod: ${document.getElementById('prod').value}`;
            
            // Usamos el formato ISO que Airtable entiende perfectamente
            const fechaActual = new Date().toISOString();

            const datosAEnviar = {
                "records": [{
                    "fields": {
                        "DATOS": infoTexto,
                        "FECHA": fechaActual
                    }
                }]
            };

            try {
                const response = await fetch(`https://api.airtable.com{APP_ID}/${TABLE_ID}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datosAEnviar)
                });

                const resultado = await response.json();

                if (response.ok) {
                    alert("✅ ¡ÉXITO! Registro guardado en Airtable.");
                    location.reload();
                } else {
                    // Si Airtable responde con error, te dirá el mensaje técnico
                    console.error("Error técnico:", resultado);
                    alert("❌ ERROR DE AIRTABLE: " + (resultado.error.message || resultado.error.type));
                    btn.disabled = false;
                    btn.innerText = "REINTENTAR";
                }
            } catch (error) {
                // Si el navegador bloquea la respuesta por CORS, avisamos que revise la tabla
                console.error("Error de conexión:", error);
                alert("⚠️ AVISO: El navegador bloqueó la confirmación, pero verifique su Airtable.");
                btn.disabled = false;
                btn.innerText = "REINTENTAR";
            }
        }
    </script>
</body>
</html>
